<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datapath Visualizer</title>
    <!--Our stylesheet-->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!--Top navigation bar-->
    <header class="topbar">
        <span class="topbar__title">Datapath Visualizer</span>
        <nav class="topbar__nav">
            <a href="#" class="active">Simulator</a>
            <a href="#">Learn</a>
            <a href="#">About</a>
        </nav>
    </header>
    <!--Layout with sidebar on left and canvas on right-->
    <div class="layout">
        <!--Sidebar controls and component info go here-->
        <aside class="sidebar">
            <!--Panels added here-->
            <section class="panel">
                <h2 class="panel__heading">Mode</h2>

                <div class="mode-toggle" id="mode-toggle-container">
                    <div class="toggle-slider"></div> <button id="learn-toggle" class="toggle-btn active">Learn</button>
                    <button id="quiz-toggle" class="toggle-btn">Quiz</button>
                </div>
            </section>
            <!-- Controls-->
            <section class="panel" id="controls-panel">
                <h2 class="panel__heading">Simulation Controls</h2>
                <button id="run-btn">Run</button>
                <button id="step-btn">Step</button>
                <button id="reset-btn">Reset</button>
            </section>
            <section class="panel" id="instruction-types-panel">
                <h2 class="panel__heading">SELECT INSTRUCTION</h2>

                <div class="instruction-grid">
                    <button id="none-btn"  class="square-btn none-color">None</button>
                    <button id="alu-btn" class="square-btn alu-color">ALU</button>
                    <button id="load-btn" class="square-btn load-color">Load</button>
                    <button id="store-btn" class="square-btn store-color">Store</button>
                    <button id="branch-btn" class="square-btn branch-color">Branch</button>
                    <button id="jump-btn"  class="square-btn jump-color">Jump</button>
                </div>

            </section>
        </aside>
        <main class="canvas-wrapper">
                <div class="zoom-controls">
                    <button id="zoom-in">+</button>
                    <button id="zoom-out">−</button>
                    <button id="zoom-reset">Reset</button>
                </div>

                <div id="konva-container"></div>
            </main>
        </div>
        <script src="https://unpkg.com/konva@9/konva.min.js"></script>
        <script type="module" src="src/main.js"></script>
    </body>
    </html>
